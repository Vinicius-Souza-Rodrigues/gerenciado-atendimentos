name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/maven.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run checkstyle
      working-directory: ./backend
      run: mvn checkstyle:check

    - name: Run tests
      working-directory: ./backend
      run: mvn clean test

    - name: Run SpotBugs analysis
      working-directory: ./backend
      run: mvn spotbugs:check

    - name: Generate coverage report
      working-directory: ./backend
      run: mvn jacoco:report

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella

    - name: Build application
      working-directory: ./backend
      run: mvn clean package -DskipTests

    - name: Comment PR with results
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let comment = '## CI/CD Pipeline Results\n\n';
          comment += '✅ **Checkstyle** - Code style validation passed\n';
          comment += '✅ **Unit Tests** - All tests passed\n';
          comment += '✅ **SpotBugs** - No bugs detected\n';
          comment += '✅ **Coverage** - Check report in artifacts\n';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
